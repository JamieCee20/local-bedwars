    - material: OAK_PLANKS
      quantity: 16
      currency: gold
      price: 4
      slot: 22
    - material: END_STONE
      quantity: 12
      currency: iron
      price: 24
      slot: 23
    - material: OBSIDIAN
      quantity: 4
