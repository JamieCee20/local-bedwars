# Shop items per category.
# currency: iron | gold | diamond | emerald
#
# Inventory layout (54 slots, 6 rows x 9 columns):
#   Row 1 (nav tabs):  0  1  2  3  4  5  6  7  8
#   Row 2 (separator): 9 10 11 12 13 14 15 16 17
#   Row 3 (content):  [18] 19 20 21 22 23 24 25 [26]
#   Row 4 (content):  [27] 28 29 30 31 32 33 34 [35]
#   Row 5 (content):  [36] 37 38 39 40 41 42 43 [44]
#   Row 6 (content):  [45] 46 47 48 49 50 51 52 [53]
# Slots in [brackets] are glass borders. Valid item slots: 19-25, 28-34, 37-43, 46-52.
shop:
  BLOCKS:
    - material: WHITE_WOOL
      quantity: 16
      currency: iron
      price: 4
      slot: 19
