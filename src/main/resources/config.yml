game:
  world: world          # lobby world — where players wait between games
  min-players: 1
  countdown-time: 10
  dev-mode: true       # set to true for solo testing — relaxes team requirements

# The schematic file to load (place it in the plugin's data folder).
# 'origin' is the block position in the new void world where the schematic's
# clipboard origin is placed (i.e. the position you stood on when you ran //copy).
map:
  schematic: "bedwars_map.schem"
  origin:
    x: 0
    y: 64
    z: 0

# Spawn and bed positions are OFFSETS from map.origin — i.e. the position of
# each block inside your schematic relative to where you stood when copying it.
# World position = map.origin + offset.
# To find offsets: in WorldEdit, note the coordinates of each spawn/bed block,
# then subtract your //copy origin position.
teams:
  RED:
    spawn:
      x: 64.0
      y: -1.0
      z: -2.0
    bed:
      x: 54.0
      y: -2.0
      z: 1.0
    shop:
      x: 64.0
      y: -2.0
      z: 1.0
      yaw: 180.0
    generators:
      iron:
        x: 68.0
        y: -3.0
        z: -2
      gold:
        x: 68.0
        y: -3.0
        z: -2
  BLUE:
    spawn:
      x: 6.0
      y: -1.0
      z: -58.0
    bed:
      x: -3.0
      y: -2.0
      z: -55.0
    shop:
      x: 9.0
      y: -2.0
      z: -58.0
      yaw: 90.0
    generators:
      iron:
        x: 6.0
        y: -3.0
        z: -62.0
      gold:
        x: 6.0
        y: -3.0
        z: -62.0
  GREEN:
    spawn:
      x: -72.0
      y: 1.0
      z: 11.0
    bed:
      x: -61.0
      y: 0.0
      z: 7.0
    shop:
      x: -72.0
      y: 0.0
      z: 8.0
      yaw: 0.0
    generators:
      iron:
        x: -76.0
        y: -1.0
        z: 11.0
      gold:
        x: -76.0
        y: -1.0
        z: 11.0
  YELLOW:
    spawn:
      x: 0.0
      y: -3
      z: 58.0
